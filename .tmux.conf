# Set the default terminal mode to 256color mode
# set -g default-terminal "screen-256color"

############################################################
# GENERAL
############################################################

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 0

# use <prefix> s for horizontal split
bind s split-window -v

# use <prefix> v for vertical split
bind v split-window -h

############################################################

# Vim-line pane navigation 
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# resize panes more easily
bind < resize-pane -L 10
bind > resize-pane -R 10
bind - resize-pane -D 10
bind + resize-pane -U 10

############################################################

# Use C-a instead of C-b
set -g prefix C-space
bind-key C-a last-window

# Changing copy method to more intuitive
setw -g mode-keys vi  
bind -T copy-mode-vi v send -X begin-selection # begin selection with v
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy" # yank text with y
bind P paste-buffer # paste with Ctrl+R
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy" # Enable mouse

# reload config file
bind r source-file ~/.tmux.conf \; display "Source Reloaded!"

setw -g monitor-activity on
set -g visual-activity on

# Set mouse mode on
set -g mouse on

############################################################
# TMUX Pluging Manager
############################################################
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jabirali/tmux-tilish'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'dracula/tmux'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

